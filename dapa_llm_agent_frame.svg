  <rect x="424" y="586" width="282" height="36" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="440" y="609" class="tiny">FILE 방위사업청_국내조달 조달계획</text>
  <rect x="718" y="586" width="282" height="36" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="734" y="609" class="tiny">FILE 방위사업청_국외조달 조달계획</text>
  <rect x="424" y="632" width="282" height="36" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="440" y="655" class="tiny">FILE 방위사업청_국내조달 공사계획</text>
  <rect x="718" y="632" width="282" height="36" rx="8" fill="#ffffff" stroke="#b8d7ff"/>
  <text x="734" y="655" class="tiny blue">API 방위사업청_군수품조달정보 조달계획</text>
  <text x="424" y="692" class="tiny">답변에는 기준일, 파일 갱신주기, API 조회 시점을 함께 표시합니다.</text>

  <rect x="404" y="738" width="626" height="78" rx="12" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="424" y="766" class="small">다음 질문 추천</text>
  <rect x="424" y="782" width="180" height="24" rx="12" fill="#f1f5f9"/>
  <text x="438" y="798" class="tiny">유사 입찰결과 비교</text>
  <rect x="614" y="782" width="194" height="24" rx="12" fill="#f1f5f9"/>
