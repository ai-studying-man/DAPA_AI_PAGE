  <text x="1168" y="608" class="tiny">#법령해석 #규정현황 #민원</text>
  <text x="1168" y="626" class="tiny">#지식마당 #공개자료</text>

  <rect x="1152" y="648" width="236" height="76" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
