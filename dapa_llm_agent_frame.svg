  <text x="500" y="479" class="small">1. 현재 조달계획 API로 최신 사업 후보 조회</text>
  <circle cx="486" cy="496" r="4" fill="#0b66d8"/>
  <text x="500" y="501" class="small">2. 파일데이터로 과거 조달계획과 공사계획 비교</text>

