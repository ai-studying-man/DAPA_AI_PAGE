  <rect x="818" y="782" width="176" height="24" rx="12" fill="#f1f5f9"/>
  <text x="832" y="798" class="tiny">업체 참여 가능성 확인</text>

  <rect x="404" y="866" width="626" height="64" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="428" y="904" class="body muted">방위사업, 조달계획, 입찰공고, 계약정보에 대해 질문하세요.</text>
  <rect x="956" y="880" width="54" height="36" rx="18" fill="#0b66d8"/>
  <text x="973" y="903" class="body white">전송</text>

