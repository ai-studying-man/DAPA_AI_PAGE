  <text x="1152" y="456" class="h3">목차별 대표 키워드</text>
  <rect x="1152" y="476" width="236" height="76" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="1168" y="500" class="small">방위사업 용어·규격</text>
  <text x="1168" y="522" class="tiny">#용어사전 #국방규격 #코드조회</text>
  <text x="1168" y="540" class="tiny">#국방표준 #군수품목록</text>

  <rect x="1152" y="562" width="236" height="76" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
